<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./stlyle.css">
</head>

<body>

    <img class="logo-Gif" src="./assets/logo.moeda.png" alt="Conversor de moedas">

    <main>

        <label>
            Converter <b>De</b>

            <select class="currency-origin">

                <option value="BRL">R$ Real Brasileiro</option>

                <option value="USD">US$ Dólar Americano</option>

                <option value="EUR">€ Euro</option>

                <option value="GBP">£ Libra</option>

                <option value="BTC">₿ Bitcoin</option>

            </select>

        </label>

        <label>
            Converter <b>Para</b>

            <select class="currency-select">

                <option value="USD">US$ Dólar Americano</option>

                <option value="EUR">€ Euro</option>

                <option value="GBP">£ Libra</option>

                <option value="BTC">₿ Bitcoin</option>

                <option value="BRL">R$ Real Brasileiro</option>

            </select>

        </label>

        <p class="valor">Valor</p>

        <input class="input-currency" placeholder="R$10.000">

        <button class="convert-button">Converter</button>

        <section>

            <div class="moeda-conversão">

                <img class="currency-origin-image"
                    src="./assets/brasil 2.jpg"
                    alt="Moeda origem">

                <p class="moeda-nome" id="currency-origin-name">
                    Real Brasileiro
                </p>

                <p class="moeda-logo" id="real">
                    R$ 0,00
                </p>

            </div>

            <img class="seta-conversão"
                src="./assets/Vector.jpg"
                alt="Seta conversão">

            <div class="moeda-conversão">

                <img class="currency-American"
                    src="./assets/estados-unidos (1) 1.jpg"
                    alt="Moeda destino">

                <p class="moeda-nome" id="moeda-americana">
                    Dólar Americano
                </p>

                <p class="moeda-logo" id="dolar">
                    US$ 0,00
                </p>

            </div>

        </section>

    </main>

    <script src="./scripts.js"></script>

</body>

</html>
